<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title></title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background-color: #f0f4f8;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #334155;
  }
  .canvas-card {
    background: white;
    border-radius: 1rem;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
  }
  #pools-canvas {
    width: 100%;
    height: auto;
    display: block;
    touch-action: manipulation;
  }
  #guess { -webkit-appearance: none; }
  #guess:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .step-button { transition: all 0.2s; touch-action: manipulation; }
  .step-button:active:not(:disabled) { transform: scale(0.95); }
  .lang-switch { transition: all 0.2s; }
  .lang-switch:hover { background-color: #f1f5f9; }
</style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

<div class="canvas-card w-full max-w-2xl p-6 md:p-10">

  <div class="flex justify-end mb-4">
    <a id="lang-switch-link" href="#" class="lang-switch px-3 py-1.5 rounded-full text-xs font-semibold border border-slate-200 text-slate-500 flex items-center gap-1.5">
      <span id="lang-switch-flag"></span>
      <span id="lang-switch-label"></span>
    </a>
  </div>

  <header class="text-center mb-8">
    <h1 id="ui-title" class="text-3xl font-extrabold text-slate-800 mb-3"></h1>
    <p id="ui-subtitle" class="text-slate-500 text-sm md:text-base leading-relaxed"></p>
  </header>

  <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 mb-6">
    <canvas id="pools-canvas"></canvas>
  </div>

  <div id="message-wrap" class="mb-5 min-h-[36px] flex items-center justify-center">
    <p id="message" class="text-sm font-semibold text-slate-600 px-4 py-2 rounded-full bg-slate-100 border border-slate-200 hidden"></p>
  </div>

  <div class="flex justify-between items-center mb-6">
    <div id="question-count-pill" class="px-4 py-1.5 rounded-full text-sm font-medium bg-blue-50 text-blue-600 border border-blue-100"></div>
    <button onclick="resetGame()" id="ui-restart-btn"
      class="step-button px-4 py-1.5 bg-white border border-slate-200 text-slate-600 rounded-lg text-sm font-semibold hover:border-blue-400 hover:text-blue-600 transition-colors shadow-sm">
    </button>
  </div>

  <div class="bg-slate-50 border border-slate-200 rounded-xl p-5 mb-6">
    <label for="guess" id="ui-guess-label" class="block text-sm font-semibold text-slate-600 mb-3 text-center"></label>
    <div class="flex gap-3 justify-center items-center">
      <input type="number" id="guess" min="1" max="36" inputmode="numeric"
        class="w-40 text-center px-3 py-2.5 border border-slate-300 rounded-lg text-sm font-bold text-slate-700 bg-white transition-all">
      <button onclick="checkGuess()" id="ui-submit-btn"
        class="step-button px-6 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-colors shadow-sm shadow-blue-200">
      </button>
    </div>
  </div>

  <div class="text-center border-t border-slate-100 pt-5">
    <p id="ui-footer" class="text-slate-400 text-xs"></p>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const LANG = (params.get('lang') === 'en') ? 'en' : 'hu';
document.documentElement.lang = LANG;

const STRINGS_HU = {
  title: 'Szennyezett medencék',
  subtitle: 'Kattints egy medencére a teszteléséhez. Találd meg a szennyezés forrását a lehető legkevesebb teszttel!',
  restartButton: 'Újrakezdés',
  guessLabel: 'Tippeld meg a szennyezés forrását',
  guessPlaceholder: 'Medence száma (1–36)',
  submitButton: 'Tippelés',
  testsUsed: (n) => `Feltett kérdések száma: ${n}`,
  footer: 'További feladatok: <a href="https://www.mindenkijon.hu/" target="_blank" rel="noopener" class="underline hover:text-slate-600 transition-colors">minden·ki·jön</a>',
  alreadyTested: () => `Erre a medencére már rákérdeztél.`,
  resultContaminated: (n) => `A(z) ${n}. medence szennyezett.`,
  resultClean: (n) => `A(z) ${n}. medence tiszta.`,
  guessOutOfRange: 'Kérlek, érvényes medence számot adj meg (1–36).',
  guessCorrect: (n) => `Gratulálok! A(z) ${n}. medence volt a szennyezés forrása.`,
  guessIncorrect: (n) => `Sajnos nem talált, a forrás a(z) ${n}. medence volt.`,
  langSwitchFlag: '🇬🇧',
  langSwitchLabel: 'English',
  langSwitchHref: '?lang=en',
};

const STRINGS_EN = {
  title: 'Polluted pools',
  subtitle: 'Click a pool to test it. Find the source of the contamination using as few tests as possible.',
  restartButton: 'Restart',
  guessLabel: 'Guess the source of the contamination',
  guessPlaceholder: 'Pool number (1–36)',
  submitButton: 'Submit',
  testsUsed: (n) => `Tests used: ${n}`,
  footer: 'More puzzles: <a href="https://www.mindenkijon.hu/" target="_blank" rel="noopener" class="underline hover:text-slate-600 transition-colors">minden·ki·jön</a>',
  alreadyTested: (n) => `Pool ${n} has already been tested.`,
  resultContaminated: (n) => `Pool ${n} is contaminated.`,
  resultClean: (n) => `Pool ${n} is clean.`,
  guessOutOfRange: 'Pool number must be between 1 and 36.',
  guessCorrect: (n) => `Correct! Pool ${n} was the source of the contamination.`,
  guessIncorrect: (n) => `Incorrect — the source was pool ${n}.`,
  langSwitchFlag: '🇭🇺',
  langSwitchLabel: 'Magyar',
  langSwitchHref: '?lang=hu',
};

const STRINGS = LANG === 'en' ? STRINGS_EN : STRINGS_HU;

function applyStrings() {
  document.title                                         = STRINGS.title;
  document.getElementById('ui-title').textContent       = STRINGS.title;
  document.getElementById('ui-subtitle').innerHTML      = STRINGS.subtitle;
  document.getElementById('ui-restart-btn').textContent = STRINGS.restartButton;
  document.getElementById('ui-guess-label').textContent = STRINGS.guessLabel;
  document.getElementById('guess').placeholder          = STRINGS.guessPlaceholder;
  document.getElementById('ui-submit-btn').textContent  = STRINGS.submitButton;
  document.getElementById('ui-footer').innerHTML        = STRINGS.footer;
  document.getElementById('question-count-pill').textContent = STRINGS.testsUsed(0);
  document.getElementById('lang-switch-flag').innerText = STRINGS.langSwitchFlag;
  document.getElementById('lang-switch-label').innerText = STRINGS.langSwitchLabel;
  document.getElementById('lang-switch-link').href      = STRINGS.langSwitchHref;
}

const GRID = 8;
const poolsData = [];
let idxMap = {};

(function buildPools() {
  let id = 1;
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      if (r + c < GRID) {
        const p = { id: id++, row: r, col: c, x: 0, y: 0, r: 0, contaminated: false, clean: false };
        poolsData.push(p);
      }
    }
  }
  poolsData.forEach((p, i) => idxMap[i] = p);
})();

const numPools = poolsData.length; // 36

let potentialSources, questionCount, checkedPools, gameOver, randomMode;

function initState() {
  potentialSources = poolsData.map((_, i) => i);
  questionCount = 0;
  checkedPools = new Array(numPools).fill(null);
  gameOver = false;
  randomMode = false;
  poolsData.forEach(p => { p.contaminated = false; p.clean = false; });
}

initState();

let canvas, ctx, poolRadius, canvasWidth, canvasHeight, isMobile;

function initCanvas() {
  canvas = document.getElementById('pools-canvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  canvas.addEventListener('click', handleCanvasClick);
  let initialTouchY;
  canvas.addEventListener('touchstart', e => { initialTouchY = e.touches[0].clientY; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!e.changedTouches.length) return;
    const touch = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;
    const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
    checkPoolAt(x * sx, y * sy);
  }, { passive: true });
}

function resizeCanvas() {
  const screenWidth = window.innerWidth;
  isMobile = screenWidth <= 650;
  canvasWidth = isMobile ? Math.min(screenWidth - 40, 650) : Math.min(650, screenWidth - 80);
  const cellSize = Math.floor((canvasWidth - 20) / GRID);
  poolRadius = Math.max(10, Math.floor(cellSize * 0.38));
  canvasHeight = cellSize * GRID + 20;
  canvas.width = canvasWidth;
  canvas.height = canvasHeight;
  layoutPools(cellSize);
  drawPools();
}

function layoutPools(cellSize) {
  poolsData.forEach(p => {
    p.x = 10 + p.col * cellSize + cellSize / 2;
    p.y = 10 + p.row * cellSize + cellSize / 2;
    p.r = poolRadius;
  });
}

function drawPools() {
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);

  poolsData.forEach(p => {
    const right = poolsData.find(q => q.row === p.row && q.col === p.col + 1);
    if (right) drawArrow(p.x + p.r + 2, p.y, right.x - right.r - 2, right.y);
    const down = poolsData.find(q => q.row === p.row + 1 && q.col === p.col);
    if (down) drawArrow(p.x, p.y + p.r + 2, down.x, down.y - down.r - 2);
  });

  poolsData.forEach(p => {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.08)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
    ctx.fillStyle = p.contaminated ? '#f44336' : p.clean ? '#4caf50' : '#add8e6';
    ctx.fill();
    ctx.restore();

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = p.contaminated ? '#dc2626' : p.clean ? '#16a34a' : '#3b82f6';
    ctx.stroke();

    const fontSize = isMobile ? Math.max(9, Math.min(13, p.r * 0.58)) : Math.max(10, Math.min(14, p.r * 0.65));
    ctx.fillStyle = (p.contaminated || p.clean) ? '#fff' : '#1e40af';
    ctx.font = `bold ${fontSize}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.id, p.x, p.y);
  });
}

function drawArrow(fromX, fromY, toX, toY) {
  if (toX <= fromX + 5 && toY <= fromY + 5) return;
  const headlen = isMobile ? Math.max(5, poolRadius * 0.35) : 8;
  const dx = toX - fromX, dy = toY - fromY;
  const angle = Math.atan2(dy, dx);
  const length = Math.sqrt(dx * dx + dy * dy);
  const shortening = Math.min(3, length * 0.1);
  const atx = toX - shortening * Math.cos(angle);
  const aty = toY - shortening * Math.sin(angle);
  const lw = isMobile ? Math.max(1, poolRadius * 0.05) : 1.5;

  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.lineTo(atx, aty);
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = lw;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(toX, toY);
  ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
  ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
  ctx.closePath();
  ctx.fillStyle = '#94a3b8';
  ctx.fill();
}

function canContaminate(srcIdx, tgtIdx) {
  const s = poolsData[srcIdx], t = poolsData[tgtIdx];
  return t.row >= s.row && t.col >= s.col;
}

function decidePollution(poolIdx) {
  const contamSrcs = potentialSources.filter(s => canContaminate(s, poolIdx));
  const cleanSrcs  = potentialSources.filter(s => !canContaminate(s, poolIdx));

  if (randomMode) {
    if (cleanSrcs.length === 0) return true;
    if (contamSrcs.length === 0) return false;
    return Math.random() < 0.5;
  }

  if (cleanSrcs.length === 0) return true;
  return false;
}

function checkPollution(poolIdx) {
  if (gameOver) return;
  if (checkedPools[poolIdx] !== null) {
    showMessage(STRINGS.alreadyTested(poolsData[poolIdx].id), 'neutral');
    return;
  }

  if (questionCount >= 8 && !randomMode) randomMode = true;

  const isContaminated = decidePollution(poolIdx);

  potentialSources = isContaminated
    ? potentialSources.filter(s => canContaminate(s, poolIdx))
    : potentialSources.filter(s => !canContaminate(s, poolIdx));

  checkedPools[poolIdx] = isContaminated;
  questionCount++;
  document.getElementById('question-count-pill').textContent = STRINGS.testsUsed(questionCount);

  poolsData[poolIdx].contaminated = isContaminated;
  poolsData[poolIdx].clean = !isContaminated;

  showMessage(
    isContaminated ? STRINGS.resultContaminated(poolsData[poolIdx].id) : STRINGS.resultClean(poolsData[poolIdx].id),
    isContaminated ? 'contaminated' : 'clean'
  );
  drawPools();
}

function handleCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
  checkPoolAt((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
}

function checkPoolAt(x, y) {
  poolsData.forEach((p, i) => {
    const hitR = isMobile ? p.r * 1.3 : p.r;
    const d = Math.sqrt((x - p.x) ** 2 + (y - p.y) ** 2);
    if (d < hitR) checkPollution(i);
  });
}

function checkGuess() {
  if (gameOver) return;
  const val = parseInt(document.getElementById('guess').value);
  if (isNaN(val) || val < 1 || val > 36) {
    showMessage(STRINGS.guessOutOfRange, 'neutral');
    return;
  }
  const guessIdx = poolsData.findIndex(p => p.id === val);
  if (guessIdx < 0) { showMessage(STRINGS.guessOutOfRange, 'neutral'); return; }

  if (potentialSources.length === 1 && potentialSources[0] === guessIdx) {
    gameOver = true;
    revealPollution(guessIdx);
    showMessage(STRINGS.guessCorrect(val), 'clean');
  } else {
    const others = potentialSources.filter(s => s !== guessIdx);
    const srcIdx = others.length > 0 ? others[Math.floor(Math.random() * others.length)] : potentialSources[0];
    gameOver = true;
    revealPollution(srcIdx);
    showMessage(STRINGS.guessIncorrect(poolsData[srcIdx].id), 'contaminated');
  }
  if (isMobile) canvas.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function revealPollution(srcIdx) {
  poolsData.forEach((p, i) => {
    const cont = canContaminate(srcIdx, i);
    p.contaminated = cont;
    p.clean = !cont;
  });
  drawPools();
  const p = poolsData[srcIdx];
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r + 4, 0, 2 * Math.PI);
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#f97316';
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r + 7, 0, 2 * Math.PI);
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#fdba74';
  ctx.stroke();
}

function showMessage(text, type) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = 'text-sm font-semibold px-4 py-2 rounded-full border';
  if (type === 'contaminated') {
    el.className += ' text-red-600 bg-red-50 border-red-200';
  } else if (type === 'clean') {
    el.className += ' text-green-700 bg-green-50 border-green-200';
  } else {
    el.className += ' text-slate-600 bg-slate-100 border-slate-200';
  }
  el.classList.remove('hidden');
}

function resetGame() {
  initState();
  document.getElementById('question-count-pill').textContent = STRINGS.testsUsed(0);
  const el = document.getElementById('message');
  el.classList.add('hidden');
  document.getElementById('guess').value = '';
  drawPools();
}

window.addEventListener('resize', () => { if (canvas) resizeCanvas(); });
document.getElementById('guess').addEventListener('keypress', e => { if (e.key === 'Enter') checkGuess(); });
window.addEventListener('load', () => { applyStrings(); initCanvas(); drawPools(); });
</script>
</body>
</html>
