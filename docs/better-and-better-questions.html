<!DOCTYPE html>
<html lang="en">
<head>
    <title>Better and better questions</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #334155;
        }
        .canvas-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .number-btn {
            transition: all 0.15s;
            touch-action: manipulation;
        }
        .number-btn:hover:not(:disabled) {
            border-color: #60a5fa;
            color: #2563eb;
            background-color: #eff6ff;
        }
        .number-btn:active:not(:disabled) {
            transform: scale(0.95);
        }
        .win-gradient {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border: 1px solid #bbf7d0;
        }
        .loss-gradient {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

<div class="canvas-card w-full max-w-2xl p-6 md:p-10">

    <header class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-3">Better and better questions</h1>
        <p class="text-slate-500 text-sm md:text-base leading-relaxed">
            Pick a number from <span class="font-bold text-blue-600">1</span> to <span class="font-bold text-blue-600">14</span>.<br class="hidden sm:block">
            Is the chosen number <span class="font-bold text-slate-700">closer</span> to the secret number than the previous one?
        </p>
    </header>

    <!-- Status + Question count -->
    <div class="flex flex-wrap justify-between items-end mb-8 gap-4">
        <div id="status-pill" class="px-4 py-1.5 rounded-full text-sm font-medium bg-blue-50 text-blue-600 border border-blue-100">
            Pick a number to start
        </div>
        <div class="text-right">
            <span class="text-slate-400 text-xs uppercase tracking-wider font-bold">Questions asked</span>
            <div id="questionCount" class="text-4xl font-black text-slate-700">0</div>
        </div>
    </div>

    <!-- Number grid -->
    <div class="grid grid-cols-7 sm:grid-cols-14 gap-2 mb-6" id="numberGrid">
    </div>

    <!-- History log -->
    <div id="historyLog" class="mb-6 min-h-[48px] p-4 bg-slate-50 rounded-xl border border-slate-100 text-sm text-slate-600 leading-relaxed">
        <span class="text-slate-400 italic">Your picks will appear here…</span>
    </div>

    <!-- Guess section -->
    <div id="guessSection" class="mb-6 p-6 bg-slate-50 rounded-xl border border-slate-100">
        <h2 class="text-base font-bold text-slate-700 mb-4 text-center">Guess the secret number!</h2>
        <div class="flex gap-3 items-center justify-center flex-wrap">
            <input
                type="number"
                id="guessInput"
                placeholder="1 – 14"
                min="1" max="14"
                class="w-32 text-center border border-slate-200 rounded-lg px-3 py-2 text-slate-700 font-semibold focus:outline-none focus:ring-2 focus:ring-blue-300"
            >
            <button id="guessButton"
                class="px-6 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold transition-colors shadow-sm">
                Submit
            </button>
        </div>
        <div id="result-message" class="mt-4 text-center font-semibold text-base"></div>
    </div>

    <!-- Alert / end state -->
    <div id="alert" class="hidden mb-6 p-8 rounded-2xl text-center">
        <p id="alert-text" class="font-bold text-lg mb-4"></p>
        <button onclick="resetGame()"
            class="px-8 py-2.5 bg-white text-slate-700 border border-slate-200 rounded-lg font-semibold hover:bg-slate-50 transition-colors shadow-sm">
            New game
        </button>
    </div>

    <div class="flex justify-center border-t border-slate-100 pt-6">
        <button onclick="resetGame()" class="text-slate-400 hover:text-slate-600 text-sm font-medium transition-colors">⟳ Restart</button>
    </div>

    <div class="text-center pt-4 border-t border-slate-100 mt-4">
        <p class="text-slate-400 text-xs">
            This game is part of the <a href="https://monthofmath.substack.com/" target="_blank" rel="noopener" class="underline hover:text-slate-600 transition-colors">Month of Math</a> program.
        </p>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        let guessed = false;
        let guessCount = 0;
        let previousGuess = null;
        let possibleNumbers = Array.from({ length: 14 }, (_, i) => i + 1);
        let firstPick = true;

        const guessInput    = document.getElementById("guessInput");
        const guessButton   = document.getElementById("guessButton");
        const questionCountDiv = document.getElementById("questionCount");
        const historyLog    = document.getElementById("historyLog");
        const resultMessageDiv = document.getElementById("result-message");
        const statusPill    = document.getElementById("status-pill");
        const alertDiv      = document.getElementById("alert");
        const alertText     = document.getElementById("alert-text");
        const guessSection  = document.getElementById("guessSection");

        // Build number grid
        const grid = document.getElementById("numberGrid");
        for (let i = 1; i <= 14; i++) {
            const btn = document.createElement("button");
            btn.className = "number-btn py-2 px-1 bg-white border border-slate-200 text-slate-700 rounded-lg font-bold text-sm";
            btn.textContent = i;
            btn.dataset.number = i;
            btn.addEventListener("click", handleNumberClick);
            grid.appendChild(btn);
        }

        function handleNumberClick() {
            if (guessed) return;
            const clickedNumber = parseInt(this.dataset.number);
            guessCount++;
            questionCountDiv.textContent = guessCount;

            let resultText = "";

            if (guessCount === 1) {
                resultText = `You picked <strong>${clickedNumber}</strong> first.`;
                firstPick = false;
                statusPill.textContent = "Keep picking…";
                statusPill.className = "px-4 py-1.5 rounded-full text-sm font-medium bg-amber-50 text-amber-600 border border-amber-100";
            } else {
                const closerPossibilities    = possibleNumbers.filter(p => Math.abs(clickedNumber - p) < Math.abs(previousGuess - p));
                const notCloserPossibilities = possibleNumbers.filter(p => Math.abs(clickedNumber - p) >= Math.abs(previousGuess - p));

                let chosenResponse = "";
                let updatedPossibleNumbers = [];

                if (closerPossibilities.length > 0 && notCloserPossibilities.length === 0) {
                    chosenResponse = `<strong>${clickedNumber}</strong> is <span class="text-green-600 font-semibold">closer</span> than ${previousGuess}.`;
                    updatedPossibleNumbers = closerPossibilities;
                } else if (notCloserPossibilities.length > 0 && closerPossibilities.length === 0) {
                    chosenResponse = `<strong>${clickedNumber}</strong> is <span class="text-red-500 font-semibold">not closer</span> than ${previousGuess}.`;
                    updatedPossibleNumbers = notCloserPossibilities;
                } else if (closerPossibilities.length > notCloserPossibilities.length) {
                    chosenResponse = `<strong>${clickedNumber}</strong> is <span class="text-green-600 font-semibold">closer</span> than ${previousGuess}.`;
                    updatedPossibleNumbers = closerPossibilities;
                } else {
                    chosenResponse = `<strong>${clickedNumber}</strong> is <span class="text-red-500 font-semibold">not closer</span> than ${previousGuess}.`;
                    updatedPossibleNumbers = notCloserPossibilities;
                }

                resultText = chosenResponse;
                possibleNumbers = updatedPossibleNumbers;
            }

            // Append to history log
            const wasEmpty = historyLog.querySelector('.italic');
            if (wasEmpty) historyLog.innerHTML = "";
            historyLog.innerHTML += `<span class="text-slate-400 text-xs">#${guessCount}</span> ${resultText}<br>`;

            previousGuess = clickedNumber;
        }

        guessButton.addEventListener("click", function () {
            if (!guessed) {
                const userGuess = parseInt(guessInput.value);
                if (userGuess >= 1 && userGuess <= 14) {
                    let message = "";
                    let type = "";
                    if (possibleNumbers.length === 1 && possibleNumbers.includes(userGuess)) {
                        message = `🎉 You got it! The secret number was ${userGuess}. Congratulations — guessed in ${guessCount} question${guessCount !== 1 ? 's' : ''}!`;
                        type = "win";
                    } else {
                        const correct = possibleNumbers.filter(n => n !== userGuess)[0];
                        message = `Sorry, not correct! The secret number was ${correct}.`;
                        type = "loss";
                    }
                    guessed = true;
                    showEnd(message, type);
                } else {
                    guessInput.value = "";
                    guessInput.placeholder = "Enter 1–14";
                }
            }
        });

        function showEnd(msg, type) {
            guessSection.classList.add("hidden");
            statusPill.textContent = "Game over";
            statusPill.className = "px-4 py-1.5 rounded-full text-sm font-medium bg-slate-100 text-slate-400 border border-slate-200";

            alertText.textContent = msg;
            alertDiv.classList.remove("hidden");
            alertDiv.className = `mb-6 p-8 rounded-2xl text-center ${type === 'win' ? 'win-gradient' : 'loss-gradient'}`;
        }

        window.resetGame = function () {
            guessed = false;
            guessCount = 0;
            previousGuess = null;
            firstPick = true;
            possibleNumbers = Array.from({ length: 14 }, (_, i) => i + 1);

            questionCountDiv.textContent = "0";
            historyLog.innerHTML = '<span class="text-slate-400 italic">Your picks will appear here…</span>';
            guessInput.value = "";
            resultMessageDiv.innerHTML = "";

            alertDiv.classList.add("hidden");
            guessSection.classList.remove("hidden");

            statusPill.textContent = "Pick a number to start";
            statusPill.className = "px-4 py-1.5 rounded-full text-sm font-medium bg-blue-50 text-blue-600 border border-blue-100";
        };
    });
</script>
</body>
</html>
